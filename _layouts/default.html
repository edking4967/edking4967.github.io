<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ page.title | default: "Edward King | Software Engineer & Educator" }}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link href="/assets/style.css" rel="stylesheet">
</head>
<body>

<nav>
    <div class="logo"><a href="/" style="text-decoration:none;color:inherit;">EK.</a></div>
    <button class="hamburger" aria-label="Toggle menu" aria-expanded="false">
        <span></span><span></span><span></span>
    </button>
    <ul class="nav-links">
        <li><a href="https://edkingportfolio.github.io/resume/">Resume</a></li>
        <li><a href="/#experience">Experience</a></li>
        <li><a href="/#projects">Projects</a></li>
        <li><a href="/#teaching">Teaching</a></li>
        <li><a href="/#education">Education</a></li>
        <li><a href="/#writing">Technical Writing</a></li>
        <li><a href="/vg">Videogames</a></li>
        <li><a href="/ai">AI</a></li>
    </ul>
</nav>

<script>
    const hamburger = document.querySelector('.hamburger');
    const navLinks = document.querySelector('.nav-links');
    hamburger.addEventListener('click', () => {
        const open = navLinks.classList.toggle('open');
        hamburger.classList.toggle('open', open);
        hamburger.setAttribute('aria-expanded', open);
    });
    navLinks.querySelectorAll('a').forEach(a => {
        a.addEventListener('click', () => {
            navLinks.classList.remove('open');
            hamburger.classList.remove('open');
            hamburger.setAttribute('aria-expanded', false);
        });
    });
</script>

{{ content }}

<footer>
    <p>&copy; 2023 Edward King, M.Ed.. Built for performance and clarity.</p>
</footer>

</body>
</html>
